<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS BUSCADOR</title>

<style>
body { font-family: Arial; margin:0; background:#f0f2f5; }
.header { background:#2ecc71; color:white; padding:15px; text-align:center; font-size:20px; }
.container { padding:15px; }
input { width:100%; padding:12px; margin:5px 0; border-radius:10px; border:1px solid #ccc; }
button { width:100%; padding:14px; background:#2ecc71; color:white; border:none; border-radius:10px; font-size:16px; margin-top:5px; }
.card { background:white; padding:12px; margin-top:10px; border-radius:12px; }
.rojo { color:red; font-weight:bold; }
.verde { color:green; font-weight:bold; }
.azul { color:#2ecc71; font-weight:bold; }
#progress { margin-top:10px; font-weight:bold; }
</style>
</head>

<body>

<div class="header">SAS BUSCADOR</div>

<div class="container">
<input id="apellidos" placeholder="Apellidos (obligatorio)">
<input id="nombre" placeholder="Nombre (opcional)">
<input id="dni" placeholder="DNI (opcional)">
<button onclick="buscar()">Buscar</button>

<div id="progress"></div>
<div id="results"></div>
</div>

<script>
function limpiar(txt){
  return txt.toLowerCase().replace(/\s+/g," ").trim();
}

async function buscar(){

const apellidos=document.getElementById("apellidos").value.trim().toLowerCase();
const nombre=document.getElementById("nombre").value.trim().toLowerCase();
const dniBuscar=document.getElementById("dni").value.trim().toLowerCase();
const resultsDiv=document.getElementById("results");
const progressDiv=document.getElementById("progress");

if(!apellidos && !dniBuscar){
  resultsDiv.innerHTML="<span class='rojo'>Introduce apellidos o DNI</span>";
  return;
}

resultsDiv.innerHTML="";
progressDiv.innerHTML="Iniciando búsqueda...";

let resultados=[];
let adicional={};

let totalPaginas = 52 + 91;
let procesadas = 0;

function actualizarProgreso(){
  let porcentaje = Math.floor((procesadas / totalPaginas) * 100);
  progressDiv.innerHTML = `Progreso: ${porcentaje}%`;
}

function coincide(nombreC,dni){
 const txt=nombreC.toLowerCase();
 if(dniBuscar && !dni.toLowerCase().includes(dniBuscar)) return false;
 if(apellidos && !txt.includes(apellidos)) return false;
 if(nombre && !txt.includes(nombre)) return false;
 return true;
}

function pintarFinal(){

if(resultados.length === 0){
  resultsDiv.innerHTML = "<span class='rojo'>No se han encontrado resultados</span>";
  return;
}

resultsDiv.innerHTML = resultados.map(r=>{

let nota=parseFloat(r.nota.replace(",","."));
let clase = nota>=40 ? "verde":"rojo";

let extra="";
let extraNota="";

if(!isNaN(nota) && nota < 40){
 extra="<span class='verde'>✔ En bolsa adicional</span>";

 const clave = limpiar(r.nombre);

 if(adicional[clave]){
   extraNota = `<span class="azul">Nota adicional: ${adicional[clave]}</span>`;
 } else {
   extraNota = `<span class="rojo">Nota adicional: No encontrada</span>`;
 }
}

return `<div class="card">
<b>${r.nombre}</b><br>
DNI: ${r.dni}<br>
<span class="${clase}">Bolsa: ${r.nota}</span><br>
${extra}<br>
${extraNota}
</div>`;

}).join("");

progressDiv.innerHTML += " ✔ Completado";
}

async function scrap(url,tipo){
 try{
  const proxy = "https://corsproxy.io/?";
  const res = await fetch(proxy + encodeURIComponent(url));
  const html = await res.text();
  const doc = new DOMParser().parseFromString(html, "text/html");

  doc.querySelectorAll("table tr").forEach(row=>{
    const c=row.querySelectorAll("td");

    // BOLSA NORMAL
    if(tipo==="bolsa" && c.length>6){
      const dni=c[0].innerText.trim();
      const nombreC=c[1].innerText.trim();
      const nota=c[6].innerText.trim();

      if(coincide(nombreC,dni)){
        resultados.push({nombre:nombreC,dni,nota});
      }
    }

    // 🔥 BOLSA ADICIONAL CORRECTA
    if(tipo==="extra" && c.length>4){
      const nombreC=c[1].innerText.trim();
      const nota=c[4].innerText.trim();

      adicional[limpiar(nombreC)] = nota;
    }

  });

 }catch(e){}

 procesadas++;
 actualizarProgreso();
}

// 🔥 PROMESAS
let promesas=[];

// bolsa normal
for(let i=1;i<=52;i++){
 promesas.push(scrap(
`https://ws027.sspa.juntadeandalucia.es/profesionales/personaltemporal/bdf_listado_inscripcion.asp?c_area_esp=000&id_catesp=1004&estado=listado&provisional=0&situacion=A&orden=ORDNOTA&t=L&convocatoria=2023&pageno=${i}`,
"bolsa"
));
}

// 🔥 BOLSA ADICIONAL (PÁGINA 1 DISTINTA)
promesas.push(scrap(
"https://ws027.sspa.juntadeandalucia.es/profesionales/personaltemporal/bdf_listado_inscripcion.asp?id_catesp=1004&c_area_esp=000&situacion=X&provisional=0&t=L&convocatoria=2023",
"extra"
));

// resto páginas 2–91
for(let i=2;i<=91;i++){
 promesas.push(scrap(
`https://ws027.sspa.juntadeandalucia.es/profesionales/personaltemporal/bdf_listado_inscripcion.asp?c_area_esp=000&id_catesp=1004&estado=listado&provisional=0&situacion=X&pageno=${i}&orden=ORDNOTA&t=L&convocatoria=2023`,
"extra"
));
}

// esperar todo
await Promise.all(promesas);

// pintar final
pintarFinal();

}
</script>

</body>
</html>
